{% extends "base.html" %}
{% block title %}연구자 로그인 · Trauma Stress Lab{% endblock %}

{% block content %}
<section style="min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;background:var(--bg);">
  <div class="container-sm" style="text-align:center;padding:60px 28px;">
    <div style="width:64px;height:64px;background:var(--accent-light);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 24px;">🔒</div>
    <span class="label" style="display:block;margin-bottom:12px;">Restricted Access</span>
    <h1 style="font-size:2rem;margin-bottom:8px;">연구자 포털</h1>
    <p style="color:var(--muted);max-width:380px;margin:0 auto 36px;font-size:.95rem;">TSL 연구진 전용 공간입니다.</p>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;max-width:400px;margin:0 auto;text-align:left;">
      {% if error %}
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#b91c1c;font-size:.88rem;font-weight:600;">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="caupsynr@gmail.com" required>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px;">로그인</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:.82rem;color:var(--muted);">계정 문의: <a href="mailto:caupsynr@gmail.com" style="color:var(--accent);">caupsynr@gmail.com</a></p>
    </div>
  </div>
</section>
{% endblock %}
